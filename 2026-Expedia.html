<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Library - Expedia</title>
    <link rel="stylesheet" href="style.css">
    
    <script>
        function includeHTML() {
            var z, i, elmnt, file, xhttp;
            z = document.getElementsByTagName("*");
            for (i = 0; i < z.length; i++) {
                elmnt = z[i];
                file = elmnt.getAttribute("w3-include-html");
                if (file) {
                    xhttp = new XMLHttpRequest();
                    xhttp.onreadystatechange = function() {
                        if (this.readyState == 4) {
                            if (this.status == 200) {elmnt.innerHTML = this.responseText;}
                            if (this.status == 404) {elmnt.innerHTML = "Page not found.";}
                            elmnt.removeAttribute("w3-include-html");
                            includeHTML();
                        }
                    }
                    xhttp.open("GET", file, true);
                    xhttp.send();
                    return;
                }
            }
        }
        document.addEventListener("DOMContentLoaded", includeHTML);
    </script>
</head>
<body>

    <div w3-include-html="menu.html"></div>

    <div class="header">
        <h1><span class="campaign-label">2026</span> Expedia</h1>
    </div>

    <div class="section-card">
        <h2 id="landing-page">Landing Page</h2>
        
        <div class="asset-grid">
            <div class="asset-item" onclick="openModal('https://github.com/ApprovalPage/SNCGG-CreativeLibrary/blob/main/2026/Expedia/2026-Expedia-LandingPage1.jpg?raw=true')">
                <img class="asset-thumbnail" src="https://github.com/ApprovalPage/SNCGG-CreativeLibrary/blob/main/2026/Expedia/2026-Expedia-LandingPage1.jpg?raw=true">
                <div class="asset-caption">2026-Expedia-LandingPage1</div>
            </div>
            <div class="asset-item" onclick="openModal('https://github.com/ApprovalPage/SNCGG-CreativeLibrary/blob/main/2026/Expedia/2026-Expedia-LandingPage2.jpg?raw=true')">
                <img class="asset-thumbnail" src="https://github.com/ApprovalPage/SNCGG-CreativeLibrary/blob/main/2026/Expedia/2026-Expedia-LandingPage2.jpg?raw=true">
                <div class="asset-caption">2026-Expedia-LandingPage2</div>
            </div>
        </div>
    </div>

    <div id="assetModal" class="modal" onclick="closeModal()">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="imgFullSize">
    </div>

    <script>
        const modal = document.getElementById("assetModal");
        const modalImg = document.getElementById("imgFullSize");

        function openModal(src) {
            modal.style.display = "flex";
            modalImg.src = src;
        }

        function closeModal() {
            modal.style.display = "none";
            modalImg.src = "";
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeModal();
        });
    </script>
</body>
</html>
