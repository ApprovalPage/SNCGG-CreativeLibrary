<!DOCTYPE html>

    <title>Creative Library - Silverpush</title>
    <link rel="stylesheet" href="style.css">
    
    <script>
        function includeHTML() {
            var z, i, elmnt, file, xhttp;
            z = document.getElementsByTagName("*");
            for (i = 0; i < z.length; i++) {
                elmnt = z[i];
                file = elmnt.getAttribute("w3-include-html");
                if (file) {
                    xhttp = new XMLHttpRequest();
                    xhttp.onreadystatechange = function() {
                        if (this.readyState == 4) {
                            if (this.status == 200) {elmnt.innerHTML = this.responseText;}
                            if (this.status == 404) {elmnt.innerHTML = "Page not found.";}
                            elmnt.removeAttribute("w3-include-html");
                            includeHTML();
                        }
                    }
                    xhttp.open("GET", file, true);
                    xhttp.send();
                    return;
                }
            }
        }
        document.addEventListener("DOMContentLoaded", includeHTML);
    </script>
</head>
<body>

    <div w3-include-html="menu.html"></div>

    <div id="assetModal" class="modal" onclick="closeModal()">
        <span class="close-modal">&times;</span>
        <video class="modal-content" id="vidFullSize" controls autoplay></video>
    </div>

    <script>
        const modal = document.getElementById("assetModal");
        const modalVid = document.getElementById("vidFullSize");

        function openModal(src) {
            modal.style.display = "flex";
            modalVid.src = src;
            modalVid.play();
        }

        function closeModal() {
            modal.style.display = "none";
            modalVid.pause();
            modalVid.src = "";
        }

        // Prevent clicking the video controls from closing the modal
        modalVid.addEventListener('click', function(e) {
            e.stopPropagation();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeModal();
        });
    </script>
